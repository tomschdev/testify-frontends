packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  protobufjs: true
  sharp: true
# Disable the minimum-release-age supply-chain delay: the verifier cannot
# check the vendored @internal.ti.alis.build/protobuf tarball against npmjs
# (404) and fails CI installs otherwise.
minimumReleaseAge: 0
minimumReleaseAgeExclude:
  - '@next/env@16.2.11'
  - '@next/swc-darwin-arm64@16.2.11'
  - '@next/swc-darwin-x64@16.2.11'
  - '@next/swc-linux-arm64-gnu@16.2.11'
  - '@next/swc-linux-arm64-musl@16.2.11'
  - '@next/swc-linux-x64-gnu@16.2.11'
  - '@next/swc-linux-x64-musl@16.2.11'
  - '@next/swc-win32-arm64-msvc@16.2.11'
  - '@next/swc-win32-x64-msvc@16.2.11'
  - next@16.2.11
  - react-dom@19.2.8
  - react@19.2.8
